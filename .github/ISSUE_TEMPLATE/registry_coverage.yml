name: Registry coverage request
description: Request enrollment of a model artifact that Trustfall reports as `unknown_variant` or `not_enrolled`.
title: "[registry] "
labels: ["registry-coverage", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the coverage request. The Fall Risk registry is
        actively expanding and these requests help us prioritize
        what to enroll next.

        **This template is for PUBLIC, UPSTREAM models only.**

        - Do NOT attach model weights, safetensors files, or any
          artifact bytes to this issue. We do not need them, and
          uploading them publicly may violate the model's license.
        - Do NOT use this template for private or internal model
          artifacts. Public GitHub issues are visible to everyone.
          For private/internal enrollment, contact Fall Risk
          directly at anthony@fallrisk.ai.

  - type: input
    id: model_id
    attributes:
      label: Model identifier
      description: |
        The model identifier as you would refer to it. For Hugging
        Face models this is the `org/name` slug. For Ollama models
        it's the `name:tag`. For other artifacts, the most natural
        identifying name.
      placeholder: "Qwen/Qwen2.5-32B-Instruct"
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - Hugging Face Hub
        - Ollama
        - Direct download (publisher's site)
        - Other public source (please specify)
    validations:
      required: true

  - type: input
    id: format
    attributes:
      label: Artifact format
      description: |
        Format of the artifact you have, if known. Examples:
        safetensors, sharded safetensors, gguf (Q4_K_M), pytorch_model.bin.
      placeholder: "safetensors (sharded)"
    validations:
      required: false

  - type: input
    id: hash
    attributes:
      label: Artifact SHA-256 (optional)
      description: |
        If you are comfortable sharing it, the SHA-256 of the
        specific artifact bytes you have. This helps us confirm
        whether your artifact matches what's published upstream.
        This field is OPTIONAL — leave it blank if you'd rather not.
      placeholder: "b477be7572f0ab3ae3cbba38d508cc33e70600b2045669c4ad848051c3432094"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: |
        Optional. Anything else useful — model card link, why this
        coverage matters for your use case, related models in the
        same family that should also be enrolled.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This is a request for a publicly available upstream model. Private or internal artifacts are not accepted through public GitHub issues — for those, contact anthony@fallrisk.ai directly.
          required: true
        - label: I have NOT attached or uploaded model weights or any artifact bytes to this issue.
          required: true
        - label: I have searched existing issues to avoid duplicates.
          required: true
