# Test workflow.
#
# Runs the pytest suite across the full support matrix:
#   Python: 3.10, 3.11, 3.12, 3.13
#   OS:     ubuntu-latest, macos-latest, windows-latest
#
# This is the workflow that branch protection requires before a
# PR can be merged to main. fail-fast: false so we see whether a
# failure is OS-specific or universal.
#
# Concurrency group cancels in-flight runs when a new commit lands
# on the same ref — saves runner minutes and avoids stale CI status.

name: tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        run: pytest -q --tb=short
