# Release dry-run workflow.
#
# Manual-trigger only (workflow_dispatch). Exercises the full
# release chain — build, SHA256SUMS, SBOM, attestation generation —
# WITHOUT publishing to any PyPI instance.
#
# Use this to:
#   - Rehearse the release chain in a private repo before going public
#   - Verify a tag candidate builds correctly before pushing the tag
#   - Test changes to the release workflow without risk of publish
#
# This is a deliberately separate workflow file (not a conditional
# flag inside release.yml) so an adversarial reviewer can see at a
# glance which path will execute. There is no code path here that
# can publish to PyPI.

name: release-dry-run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Defaults to the workflow's checkout ref."
        required: false
        default: ""

permissions:
  # Read source
  contents: read
  # Allow generating attestations during dry run so we can verify
  # the attestation step works before relying on it in release.yml
  id-token: write
  attestations: write

jobs:
  build-and-verify:
    name: Build, SBOM, and attest (dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Install package and dev deps for test pass
        run: python -m pip install -e ".[test]"

      - name: Run full test suite
        run: pytest -q --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: List built artifacts
        run: |
          echo "Built artifacts:"
          ls -la dist/

      - name: Smoke-test the built wheel in a clean venv
        # Verifies the BUILT WHEEL works as a standalone install —
        # catches packaging issues like missing files in MANIFEST.in
        # or wrong entry_points. Mirrors the post-build smoke test
        # in release.yml.
        run: |
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/python -m pip install --upgrade pip
          /tmp/wheel-test/bin/python -m pip install dist/*.whl
          /tmp/wheel-test/bin/trustfall --version
          /tmp/wheel-test/bin/trustfall version
          /tmp/wheel-test/bin/trustfall --help
          /tmp/wheel-test/bin/trustfall scan --help
          /tmp/wheel-test/bin/trustfall verify --help
          /tmp/wheel-test/bin/trustfall registry --help
          /tmp/wheel-test/bin/trustfall diff --help
          echo "Built wheel smoke test passed."

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum *.whl *.tar.gz > SHA256SUMS
          echo "SHA256SUMS contents:"
          cat SHA256SUMS

      - name: Generate CycloneDX SBOM with two-venv split
        # CRITICAL: SBOM must reflect the runtime dependency graph
        # of the package as installed by users, with NO build/test/
        # SBOM-tool deps mixed in. Mirrors the SBOM step in release.yml.
        #
        # See release.yml for the full rationale. Two venvs:
        #   /tmp/runtime-venv     ← only the built wheel
        #   /tmp/sbom-tool-venv   ← only cyclonedx-bom
        run: |
          # Runtime venv: install ONLY the built wheel
          python -m venv /tmp/runtime-venv
          /tmp/runtime-venv/bin/python -m pip install --upgrade pip
          /tmp/runtime-venv/bin/python -m pip install dist/*.whl

          # Tool venv: install ONLY cyclonedx-bom
          python -m venv /tmp/sbom-tool-venv
          /tmp/sbom-tool-venv/bin/python -m pip install --upgrade pip
          /tmp/sbom-tool-venv/bin/python -m pip install cyclonedx-bom

          # Generate the SBOM: tool reads from runtime venv
          /tmp/sbom-tool-venv/bin/cyclonedx-py environment \
            --output-format JSON \
            --output-file dist/sbom.cdx.json \
            /tmp/runtime-venv/bin/python

          echo "SBOM artifact:"
          ls -la dist/sbom.cdx.json
          # Sanity check: it parses as JSON
          python -c "import json; json.load(open('dist/sbom.cdx.json'))"

          # Hardened contamination check: forbid dev/build deps AND
          # any cyclonedx-bom dep-graph leakage.
          python <<'PY'
          import json
          sbom = json.load(open('dist/sbom.cdx.json'))
          components = sbom.get('components', [])
          names = sorted({c.get('name', '').lower() for c in components})
          forbidden_dev = {'pytest', 'pytest-mock', 'pytest-asyncio',
                           'respx', 'build'}
          forbidden_sbom_tool = {'cyclonedx-bom', 'cyclonedx-python-lib',
                                 'py-serializable', 'sortedcontainers',
                                 'jsonschema', 'jsonschema-specifications',
                                 'lxml', 'license-expression',
                                 'boolean.py', 'lark', 'arrow',
                                 'pip-requirements-parser',
                                 'packageurl-python', 'defusedxml',
                                 'fqdn', 'isoduration', 'jsonpointer',
                                 'rfc3339-validator', 'rfc3986-validator',
                                 'rfc3987-syntax', 'uri-template',
                                 'webcolors'}
          dev_contam = forbidden_dev & set(names)
          tool_contam = forbidden_sbom_tool & set(names)
          if dev_contam:
              print(f"ERROR: SBOM includes dev/build deps: {sorted(dev_contam)}")
              print(f"All components: {names}")
              raise SystemExit(1)
          if tool_contam:
              print(f"ERROR: SBOM includes SBOM-tool deps (venv split failed): {sorted(tool_contam)}")
              print(f"All components: {names}")
              raise SystemExit(1)
          print(f"SBOM clean. Runtime components ({len(names)}): {names}")
          PY

      - name: Generate artifact attestations (dry run)
        # Even though we're not publishing, we run the attestation
        # step to verify it works. The attestation produced here is
        # a valid one — it can be verified with `gh attestation
        # verify` — but it isn't tied to a published release.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload artifacts for inspection
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: release-dry-run-${{ github.run_id }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/sbom.cdx.json
          retention-days: 14

      - name: Summary
        run: |
          echo "## Release dry-run summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Built ref:** \`${{ inputs.ref || github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256SUMS:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat dist/SHA256SUMS >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No PyPI upload. This was a dry run." >> $GITHUB_STEP_SUMMARY
